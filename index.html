<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAMOCA - Dark Neon Dashboard</title>
    
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        :root {
            --bg-dark: #0f172a; /* Slate 900 */
            --bg-card: #1e293b; /* Slate 800 */
            --neon-blue: #38bdf8; /* Sky 400 */
            --neon-purple: #c084fc; /* Purple 400 */
            --neon-gold: #fbbf24; /* Amber 400 */
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header Modern Tanpa Gambar */
        .neon-header {
            padding: 3rem 1rem 2rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .neon-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2.25rem;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4));
        }

        /* Card Style - Dark Neon */
        .subject-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--card-accent, var(--neon-blue));
            opacity: 0.7;
        }

        .subject-card:hover {
            transform: translateY(-2px);
            background: #273549;
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .subject-card:active {
            transform: scale(0.97);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            flex-shrink: 0;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .subject-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        /* Search Bar */
        .search-container input {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        /* Iframe Styles */
        #iframeContainer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000;
            background: #000;
            display: none;
            flex-direction: column;
        }

        .iframe-header {
            background: #0f172a;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border-bottom: 1px solid var(--neon-blue);
        }

        .iframe-viewport-wrapper {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        /* Scaling Logic (Anti-Kecil) */
        .iframe-content-scaler {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            .iframe-content-scaler {
                width: 200%; height: 200%;
                transform: scale(0.5);
                transform-origin: 0 0;
            }
        }

        @media (max-width: 480px) {
            .iframe-content-scaler {
                width: 300%; height: 300%;
                transform: scale(0.333);
                transform-origin: 0 0;
            }
        }

        /* Loading Skeleton Dark */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #2d3d54 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <header class="neon-header">
        <h1 class="neon-title">PANEL NILAI</h1>
        <p class="text-slate-400 font-medium text-[10px] md:text-xs tracking-[0.3em] uppercase mt-2">
            Try Out System • SD Santa Maria Monica
        </p>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="mb-8 search-container">
            <div class="relative w-full max-w-md mx-auto">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                <input type="text" id="searchInput" onkeyup="filterCards()" 
                    placeholder="Cari Mata Pelajaran..." 
                    class="w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-medium outline-none shadow-xl">
            </div>
        </div>

        <!-- Skeleton Loading -->
        <div id="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="subject-card skeleton"><div class="icon-box skeleton opacity-50"></div></div>
            <div class="subject-card skeleton"><div class="icon-box skeleton opacity-50"></div></div>
            <div class="subject-card skeleton"><div class="icon-box skeleton opacity-50"></div></div>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
        
        <div class="mt-12 flex flex-col items-center">
            <button onclick="fetchData(true)" class="px-6 py-2 rounded-full border border-slate-700 text-[10px] font-bold text-slate-500 hover:text-sky-400 hover:border-sky-400 transition-all uppercase tracking-widest">
                <i class="fas fa-sync-alt mr-2"></i> Refresh Data
            </button>
        </div>
    </main>

    <!-- Modal Iframe -->
    <div id="iframeContainer">
        <div class="iframe-header">
            <div class="flex items-center gap-4">
                <button onclick="closeIframe()" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-xl hover:bg-red-500/20 hover:text-red-400 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
                <div>
                    <h2 id="currentSubjectTitle" class="font-bold text-sm tracking-tight text-sky-400">MAPEL</h2>
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Database Nilai Terintegrasi</p>
                </div>
            </div>
            <div class="hidden md:block text-[10px] font-bold text-slate-600">SAMOCA v2.0</div>
        </div>
        
        <div class="iframe-viewport-wrapper">
            <div id="iframeLoading" class="absolute inset-0 bg-slate-900 flex items-center justify-center z-50">
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 border-4 border-slate-800 border-t-sky-500 rounded-full animate-spin mb-4"></div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Sinkronisasi Tabel</span>
                </div>
            </div>
            <div class="iframe-content-scaler">
                <iframe id="sheetIframe" class="w-full h-full border-none" src="" scrolling="yes" onload="hideIframeLoading()"></iframe>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzbonkVhKG9wevD9dwvsxA-Xxq7ow_ejXxevQvW1i3eXjbYtUp6ihmsd7-ecV8PLI4IAw/exec';

        async function fetchData(force = false) {
            const grid = document.getElementById('cardGrid');
            const loading = document.getElementById('loading');
            
            const cachedData = localStorage.getItem('samoca_subjects_dark');
            if (cachedData && !force) {
                renderCards(JSON.parse(cachedData));
            }

            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                if (data && data.length > 0) {
                    localStorage.setItem('samoca_subjects_dark', JSON.stringify(data));
                    renderCards(data);
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('cardGrid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';
            
            data.forEach((item) => {
                let icon = 'fa-book';
                let color = '#38bdf8'; // Blue Neon
                const nama = (item.nama || '').toLowerCase();
                
                if (nama.includes('agama')) { icon = 'fa-hands-praying'; color = '#c084fc'; }
                else if (nama.includes('pancasila')) { icon = 'fa-shield-halved'; color = '#f87171'; }
                else if (nama.includes('indonesia')) { icon = 'fa-language'; color = '#fb923c'; }
                else if (nama.includes('matematika')) { icon = 'fa-calculator'; color = '#60a5fa'; }
                else if (nama.includes('ipa')) { icon = 'fa-flask-vial'; color = '#4ade80'; }
                else if (nama.includes('ips')) { icon = 'fa-earth-asia'; color = '#2dd4bf'; }
                else if (nama.includes('inggris')) { icon = 'fa-at'; color = '#818cf8'; }
                else if (nama.includes('pjok')) { icon = 'fa-volleyball'; color = '#fbbf24'; }
                else if (nama.includes('seni')) { icon = 'fa-palette'; color = '#f472b6'; }
                else if (nama.includes('mandarin')) { icon = 'fa-pen-clip'; color = '#f43f5e'; }
                else if (nama.includes('komputer')) { icon = 'fa-microchip'; color = '#22d3ee'; }

                const card = document.createElement('div');
                card.className = 'subject-card';
                card.style.setProperty('--card-accent', color);
                card.onclick = () => openIframe(item.link, item.nama);
                card.innerHTML = `
                    <div class="icon-box" style="background-color: ${color}20; color: ${color}; --shadow-color: ${color}30">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div class="flex-grow min-width-0">
                        <h3 class="subject-name truncate">${item.nama}</h3>
                        <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest mt-0.5">Penilaian Aktif</p>
                    </div>
                    <i class="fas fa-arrow-right-long text-[10px] text-slate-600"></i>
                `;
                grid.appendChild(card);
            });
            
            loading.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        function openIframe(url, title) {
            const container = document.getElementById('iframeContainer');
            const iframe = document.getElementById('sheetIframe');
            document.getElementById('currentSubjectTitle').innerText = title.toUpperCase();
            document.getElementById('iframeLoading').style.display = 'flex';
            
            let embedUrl = url;
            if (url.includes('/edit')) {
                embedUrl = url.split('/edit')[0] + '/edit?rm=minimal&ui=2&chrome=false&widget=true';
            }

            iframe.src = embedUrl;
            container.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeIframe() {
            document.getElementById('iframeContainer').style.display = 'none';
            document.getElementById('sheetIframe').src = '';
            document.body.style.overflow = 'auto';
        }

        function hideIframeLoading() {
            document.getElementById('iframeLoading').style.display = 'none';
        }

        function filterCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('subject-card');
            Array.from(cards).forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        window.onload = () => fetchData();
    </script>
</body>
</html>
